<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claudstermind — Master Map</title>
  <link rel="stylesheet" href="/styles.css" />
  <!-- Blue brain favicon (inline SVG data URI — no external asset). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%233b82f6' d='M12 4a4 4 0 0 0-4 4 4 4 0 0 0-3 6.5A4 4 0 0 0 7 22a4 4 0 0 0 5 4V4zm8 0a4 4 0 0 1 4 4 4 4 0 0 1 3 6.5A4 4 0 0 1 25 22a4 4 0 0 1-5 4V4z'/%3E%3Cg fill='none' stroke='%2393c5fd' stroke-width='1.1'%3E%3Cpath d='M12 9h-3M12 14H7M12 19h-4M20 9h3M20 14h5M20 19h4'/%3E%3C/g%3E%3C/svg%3E" />
</head>
<body data-theme="dark">
  <header class="top">
    <div class="brand">
      <!-- Claudstermind mark: a stylised brain in the site's blue thematic. -->
      <span class="brainmark" aria-label="Claudstermind">
        <svg viewBox="0 0 32 32" width="30" height="30" role="img">
          <path fill="var(--brain-fill, #3b82f6)" d="M13 3a4.2 4.2 0 0 0-4.2 4.2A4.2 4.2 0 0 0 5.2 14a4.2 4.2 0 0 0 1.9 6.9A4.2 4.2 0 0 0 13 26.9V3z"/>
          <path fill="var(--brain-fill2, #2563eb)" d="M19 3a4.2 4.2 0 0 1 4.2 4.2A4.2 4.2 0 0 1 26.8 14a4.2 4.2 0 0 1-1.9 6.9A4.2 4.2 0 0 1 19 26.9V3z"/>
          <g fill="none" stroke="var(--brain-line, #bfdbfe)" stroke-width="1.1" stroke-linecap="round">
            <path d="M13 8.5H9.5M13 13.5H7.5M13 18.5H9M19 8.5h3.5M19 13.5h5.5M19 18.5h4"/>
          </g>
        </svg>
      </span>
      <div>
        <h1>Claudstermind</h1>
        <p class="sub">Master map of everything under <b>Ancient Holdings</b></p>
      </div>
    </div>
    <div class="top-right">
      <span class="model-pill" id="modelPill">model: —</span>
      <span class="model-pill" id="genPill">—</span>
      <span class="model-pill" id="authPill" hidden>—</span>
      <button id="themeBtn" class="ghost" title="Toggle theme">◐</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-view="overview" class="active">Overview</button>
    <button data-view="tree">Map</button>
    <button data-view="matrix">Org × Role</button>
    <button data-view="graph">Dependency graph</button>
    <button data-view="movements">Movements</button>
    <button data-view="packages">Packages</button>
    <button data-view="cascade">Cascade</button>
    <button data-view="git">Git state</button>
    <button data-view="tokens">Tokens</button>
    <button data-view="brain">Brain</button>
    <button data-view="ops" id="tabOps">Ops</button>
  </nav>

  <main id="main">
    <section id="statbar" class="statbar"></section>
    <section id="view" class="view"></section>
  </main>

  <div id="tooltip" class="tooltip" hidden></div>

  <footer class="foot">
    <span id="legend" class="legend"></span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
