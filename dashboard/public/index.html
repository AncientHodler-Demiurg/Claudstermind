<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claudstermind — Master Map</title>
  <link rel="stylesheet" href="/styles.css" />
  <!-- Claudstermind brain mark — the generated blue circuit-brain logo (transparent). -->
  <link rel="icon" type="image/png" href="/brand/favicon.png?v=2" />
</head>
<body data-theme="dark">
  <!-- The Pantheonic Header: sticky, full-chrome-width separator, up to 3 fixed levels. -->
  <header class="ph" id="ph">
    <div class="ph-inner">
      <div class="ph-l1">
        <a class="ph-name" href="#overview" title="Claudstermind — home">
          <img class="brainmark" src="/brand/claudstermind-mark.png?v=2" width="28" height="28" alt="" />
          <span>Claudstermind</span>
        </a>
        <a class="ph-ver" id="phVer" href="#admin/deploy" title="version notes">v—</a>
        <button class="ph-btn --ghost ph-back" id="phBack" hidden>◄ back</button>
        <span class="ph-spacer"></span>
        <span class="model-pill" id="modelPill">model: —</span>
        <span class="model-pill" id="genPill">—</span>
        <div class="ph-identity" id="phIdentity"></div>
        <button id="themeBtn" class="ph-btn --ghost" title="Toggle theme">◐</button>
      </div>
      <div class="ph-l2" id="phL2">
        <div class="ph-sections" id="phSections"></div>
        <a class="ph-btn --primary ph-action" id="phAction" href="#workspace">Workspace ↗</a>
      </div>
      <div class="ph-l3" id="phSubnav"></div>
    </div>
  </header>

  <main id="main">
    <section id="statbar" class="statbar"></section>
    <section id="view" class="view"></section>
  </main>

  <div id="tooltip" class="tooltip" hidden></div>

  <footer class="foot">
    <span id="legend" class="legend"></span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
